<!DOCTYPE html>
<html lang="en">
     <head>
          <meta charset="UTF-8" />
          <title>akshansh.codes</title>
          <script>
               // GitHub Pages SPA fallback encoder.
               // Any deep link (e.g. /repo/projects/replay) lands here, gets encoded
               // into the index.html querystring, and is decoded by the snippet in
               // index.html before shell.js runs. Standard rafgraph/spa-github-pages trick.
               //
               // pathSegmentsToKeep: 0 for custom domains and user.github.io root,
               //                                                   1 for project pages at user.github.io/<repo>/.
               var pathSegmentsToKeep = 1;

               var l = window.location;
               l.replace(
                    l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
                    l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
                    l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
                    (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
                    l.hash,
               );
          </script>
     </head>
     <body></body>
</html>
