          <script>
               // GitHub Pages SPA fallback decoder — restores deep-link paths
               // routed through 404.html. See `404.html` for the encoder side.
               (function (l) {
                    if (l.search && l.search[1] === '/') {
                         var decoded = l.search
                              .slice(1)
                              .split('&')
                              .map(function (s) { return s.replace(/~and~/g, '&'); })
                              .join('?');
                         window.history.replaceState(null, null,
                              l.pathname.slice(0, -1) + decoded + l.hash);
                    }
               })(window.location);
          </script>

     <body>
          <main class="scroll" id="scroll" aria-live="polite"></main>

          <!-- Quick actions: tappable command buttons (shown on mobile, where ↑↓/tab hints are useless) -->

               <span class="hud-label" aria-hidden="true">&gt;</span>

          <div class="prompt-wrap" id="prompt-wrap">
               <div class="prompt-line top"><span class="corner">╭</span><span class="dashes-fill"></span><span class="corner">╮</span></div>
               <div class="prompt-line mid">
                    <span class="corner">│</span>
                    <form class="prompt-form" id="prompt" autocomplete="off">
                         <span class="gt">&gt;</span>
                         <div class="input-suggest-wrap">

                              <input
                                   class="prompt-input"
                                   id="prompt-input"
                                   type="text"
                                   spellcheck="false"
                                   autocapitalize="off"
                                   autocorrect="off"
                                   placeholder="Try /resume, /theme, /key, /snake"
                                   aria-label="Terminal input"
                              />
                         </div>
                    </form>
                    <span class="corner">│</span>
               </div>
               <div class="prompt-line bot"><span class="corner">╰</span><span class="dashes-fill"></span><span class="corner">╯</span></div>
          </div>

          <div class="statusbar">
               <span><span class="key">↑↓</span> history &nbsp;·&nbsp; <span class="key">tab</span> autocomplete</span>
               <span><span class="ok-dot">●</span> <span id="visit-count">online</span> &nbsp;·&nbsp; akshanshkmr.github.io</span>
          </div>

          <div class="toast" id="toast" role="status" aria-live="polite"></div>

          <div class="mobile-fallback" id="mobile-fallback" hidden></div>
